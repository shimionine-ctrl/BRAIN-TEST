

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前额叶功能快速测试 - 速度计分版</title>
    <style>
        :root {
            --bg: #f5f3f0;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-light: #6b5e4a;
            --primary: #5b7b94;
            --primary-light: #e8f0f6;
            --accent: #c08261;
            --success: #6b9b6f;
            --error: #c75b5b;
            --gold: #c4973b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
            --bounce: 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-sans);
            background: linear-gradient(160deg, #f0ece6 0%, #f7f4ef 30%, #efeae2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-attachment: fixed;
        }
        .app-container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 28px 24px 24px;
            box-shadow: var(--shadow-lg);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .screen { display: none; animation: fadeSlideIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeSlideIn {
            from { opacity:0; transform: translateY(16px); }
            to { opacity:1; transform: translateY(0); }
        }
        @keyframes popIn {
            0% { transform: scale(0.85); opacity:0; }
            70% { transform: scale(1.04); opacity:1; }
            100% { transform: scale(1); opacity:1; }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        @keyframes scoreCountUp {
            from { opacity:0; transform: translateY(20px) scale(0.8); }
            to { opacity:1; transform: translateY(0) scale(1); }
        }
        .header-icon {
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #e8f0f6, #dce8f2);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin: 0 auto 12px;
            animation: popIn 0.5s var(--bounce);
        }
        .title { text-align:center; font-size:1.5rem; font-weight:700; color:var(--text); margin-bottom:4px; }
        .subtitle { text-align:center; font-size:0.88rem; color:var(--text-light); margin-bottom:20px; line-height:1.5; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap:7px;
            padding: 13px 28px; border-radius: 50px; font-size:1rem; font-weight:600;
            cursor: pointer; border: none; transition: all var(--transition);
            font-family: var(--font-sans); outline: none; white-space: nowrap;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color:#fff; box-shadow:0 4px 14px rgba(91,123,148,0.3); }
        .btn-outline { background:#fff; color:var(--primary); border:2px solid #dce5ec; }
        .btn-lg { padding:15px 36px; font-size:1.1rem; }
        .btn-block { width:100%; display:flex; }
        .btn:disabled { opacity:0.5; pointer-events:none; }

        .color-buttons { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
        .color-btn {
            padding:16px 12px; border-radius:var(--radius); font-size:1.05rem; font-weight:700;
            cursor:pointer; border:3px solid transparent; transition: all var(--bounce);
            color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.2); min-height:56px;
            display:flex; align-items:center; justify-content:center;
        }
        .color-btn.correct-flash { border-color:#fff !important; box-shadow:0 0 0 6px rgba(107,155,111,0.5) !important; background: var(--success) !important; }
        .color-btn.wrong-flash { animation: shake 0.5s ease; border-color:#fff !important; box-shadow:0 0 0 6px rgba(199,91,91,0.5) !important; }
        .color-btn-red { background:#d9534f; }
        .color-btn-blue { background:#4a90c4; }
        .color-btn-green { background:#5a9e6f; }
        .color-btn-yellow { background:#d4a030; color:#3d2e0a; text-shadow:0 1px 1px rgba(255,255,255,0.3); }

        .stroop-word { font-size:4rem; font-weight:900; text-align:center; line-height:1.2; padding:10px 0; min-height:90px; display:flex; align-items:center; justify-content:center; }
        .digit-display { font-size:3rem; font-weight:800; text-align:center; letter-spacing:0.15em; padding:20px 10px; min-height:80px; display:flex; align-items:center; justify-content:center; color:var(--text); }
        .digit-display.hidden-digits { letter-spacing:0.3em; color:#ccc; font-size:2.5rem; }

        .progress-wrap { margin-bottom:16px; }
        .progress-info { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text-light); margin-bottom:6px; }
        .progress-bar { width:100%; height:6px; background:#e8e3da; border-radius:10px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg, #a3c4d9, #5b7b94); border-radius:10px; transition: width 0.4s ease; }

        .timer-display {
            font-size: 1.8rem; font-weight: 800; text-align: center;
            margin: 8px 0; color: var(--primary); transition: color 0.3s;
        }
        .timer-display.warning { color: var(--accent); }
        .timer-display.danger { color: var(--error); animation: gentlePulse 0.5s infinite; }
        @keyframes gentlePulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .input-group { margin:12px 0; }
        .input-group input {
            width:100%; padding:14px 18px; font-size:1.3rem; border-radius:var(--radius-sm);
            border:2px solid #e0dbd2; text-align:center; background:#fafaf8; color:var(--text);
            font-family: 'SF Mono', 'Consolas', monospace; letter-spacing:0.12em;
            outline: none;
        }
        .input-group input:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(91,123,148,0.1); background:#fff; }

        .feedback-tag { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border-radius:20px; font-size:0.9rem; font-weight:600; }
        .feedback-correct { background:#e8f5e9; color:#3d6b40; }
        .feedback-wrong { background:#fdecea; color:#a84040; }

        .score-circle {
            width:130px; height:130px; border-radius:50%; margin:0 auto 16px;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            background:#fff; border:5px solid #e8e3da; animation: scoreCountUp 0.7s var(--bounce);
            box-shadow: var(--shadow-md);
        }
        .score-circle.excellent { border-color:#6b9b6f; background:#f6faf7; }
        .score-circle.good { border-color:#8aafc8; background:#f6f9fb; }
        .score-circle.fair { border-color:#d4a030; background:#fdfaf4; }
        .score-circle.poor { border-color:#c75b5b; background:#fdf7f7; }
        .score-number { font-size:2.8rem; font-weight:900; color:var(--text); line-height:1; }
        .score-label { font-size:0.85rem; color:var(--text-light); }
        .result-evaluation { text-align:center; font-size:1.1rem; font-weight:700; margin:8px 0 4px; color:var(--text); }
        .result-detail { text-align:center; font-size:0.85rem; color:var(--text-light); line-height:1.6; margin-bottom:14px; }
        .stat-row { display:flex; justify-content:space-between; padding:10px 14px; background:#fafaf8; border-radius:var(--radius-sm); margin-bottom:6px; font-size:0.9rem; }
        .stat-label { color:var(--text-light); }
        .stat-value { font-weight:700; color:var(--text); }
        .disclaimer { font-size:0.73rem; color:#aaa; text-align:center; margin-top:14px; line-height:1.5; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card">
        <!-- 欢迎页 -->
        <div class="screen active" id="screen-welcome">
            <div class="header-icon">🧠</div>
            <h1 class="title">前额叶功能快速测试</h1>
            <p class="subtitle">通过两个简单的认知任务，<br>评估<strong>抑制控制</strong>与<strong>工作记忆</strong>能力。<br><small>⚠️ 每题有限时，请快速作答！</small></p>
            <div style="text-align:center;margin-bottom:16px;">
                <span style="background:#f0f4f7;padding:6px 12px;border-radius:20px;font-size:0.82rem;">📋 斯特鲁普测试 ×10</span>
                <span style="background:#fdf6ef;padding:6px 12px;border-radius:20px;font-size:0.82rem;">🔢 数字倒背 ×5</span>
            </div>
            <button class="btn btn-primary btn-lg btn-block" onclick="startTest()">开始测试 →</button>
            <p class="disclaimer">⚠️ 本测试仅供娱乐参考，不构成医学诊断。</p>
        </div>

        <!-- Stroop测试 -->
        <div class="screen" id="screen-stroop">
            <div class="progress-wrap">
                <div class="progress-info"><span>📋 斯特鲁普测试</span><span id="stroop-progress-text">1/10</span></div>
                <div class="progress-bar"><div class="progress-fill" id="stroop-progress-fill" style="width:0%;"></div></div>
            </div>
            <p style="text-align:center;font-size:0.85rem;color:var(--text-light);margin-bottom:4px;">请选择<strong>文字的颜色</strong>（忽略字义）</p>
            <div class="timer-display" id="stroop-timer">4.0s</div>
            <div class="stroop-word" id="stroop-word-display">红</div>
            <div class="color-buttons" id="color-buttons-container">
                <button class="color-btn color-btn-red" onclick="stroopAnswer('红')">🔴 红色</button>
                <button class="color-btn color-btn-blue" onclick="stroopAnswer('蓝')">🔵 蓝色</button>
                <button class="color-btn color-btn-green" onclick="stroopAnswer('绿')">🟢 绿色</button>
                <button class="color-btn color-btn-yellow" onclick="stroopAnswer('黄')">🟡 黄色</button>
            </div>
            <div style="text-align:center;margin-top:10px;min-height:32px;" id="stroop-feedback"></div>
        </div>

        <!-- 数字倒背测试 -->
        <div class="screen" id="screen-digit">
            <div class="progress-wrap">
                <div class="progress-info"><span>🔢 数字倒背测试</span><span id="digit-progress-text">1/5</span></div>
                <div class="progress-bar"><div class="progress-fill" id="digit-progress-fill" style="width:0%;"></div></div>
            </div>
            <p style="text-align:center;font-size:0.85rem;color:var(--text-light);margin-bottom:4px;" id="digit-instruction">记住下方数字，消失后倒序输入</p>
            <div class="digit-display" id="digit-display-area">--</div>
            <div class="timer-display" id="digit-timer" style="display:none;">6.0s</div>
            <div id="digit-input-area" style="display:none;">
                <div class="input-group">
                    <input type="text" id="digit-input" inputmode="numeric" autocomplete="off" placeholder="倒序输入数字" maxlength="10">
                </div>
                <button class="btn btn-primary btn-block" id="digit-submit-btn" onclick="submitDigitAnswer()">确认提交 ✓</button>
            </div>
            <div style="text-align:center;margin-top:10px;min-height:32px;" id="digit-feedback"></div>
            <div style="text-align:center;margin-top:4px;font-size:0.78rem;color:var(--text-light);" id="digit-timer-hint"></div>
        </div>

        <!-- 结果页 -->
        <div class="screen" id="screen-result">
            <div style="text-align:center;">
                <div class="score-circle" id="score-circle">
                    <span class="score-number" id="final-score">--</span>
                    <span class="score-label">总分 / 100</span>
                </div>
                <div class="result-evaluation" id="result-evaluation">--</div>
                <div class="result-detail" id="result-detail">--</div>
            </div>
            <hr style="border-top:1px solid #e8e3da; margin:16px 0;">
            <div class="stat-row"><span class="stat-label">📋 斯特鲁普得分</span><span class="stat-value" id="stat-stroop">--</span></div>
            <div class="stat-row"><span class="stat-label">🔢 数字倒背得分</span><span class="stat-value" id="stat-digit">--</span></div>
            <div class="stat-row"><span class="stat-label">🎯 数字倒背最高位数</span><span class="stat-value" id="stat-max-digits">--</span></div>
            <button class="btn btn-outline btn-block" style="margin-top:16px;" onclick="restartTest()">🔄 重新测试</button>
            <p class="disclaimer">⚠️ 免责声明：本测试为娱乐性认知小游戏，结果仅供参考，不构成任何医学诊断或临床评估依据。</p>
        </div>
    </div>
</div>

<script>
    const state = {
        stroopQuestions: [],
        stroopCurrentIndex: 0,
        stroopScore: 0,
        stroopTotal: 10,
        stroopAnswered: false,
        stroopTimeLimit: 4000, // 4 seconds
        stroopStartTime: null,
        stroopTimerInterval: null,
        stroopTimeoutId: null,

        digitQuestions: [],
        digitCurrentIndex: 0,
        digitScore: 0,
        digitTotal: 5,
        digitMaxCorrectDigits: 0,
        digitShowing: false,
        digitAnswered: false,
        digitTimeLimit: 0,
        digitStartTime: null,
        digitTimerInterval: null,
        digitTimeoutId: null,
        digitDisplayTimeoutId: null,
    };

    const COLOR_MAP = {
        '红': { css: '#d9534f', name: '红' },
        '蓝': { css: '#4a90c4', name: '蓝' },
        '绿': { css: '#5a9e6f', name: '绿' },
        '黄': { css: '#d4a030', name: '黄' },
    };
    const COLOR_NAMES = ['红', '蓝', '绿', '黄'];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function clearAllTimers() {
        if (state.stroopTimerInterval) clearInterval(state.stroopTimerInterval);
        if (state.stroopTimeoutId) clearTimeout(state.stroopTimeoutId);
        if (state.digitTimerInterval) clearInterval(state.digitTimerInterval);
        if (state.digitTimeoutId) clearTimeout(state.digitTimeoutId);
        if (state.digitDisplayTimeoutId) clearTimeout(state.digitDisplayTimeoutId);
    }

    function startTest() {
        clearAllTimers();
        state.stroopQuestions = [];
        state.stroopCurrentIndex = 0;
        state.stroopScore = 0;
        state.stroopAnswered = false;
        for (let i = 0; i < state.stroopTotal; i++) {
            const word = COLOR_NAMES[Math.floor(Math.random() * 4)];
            let color;
            if (Math.random() < 0.55) {
                const others = COLOR_NAMES.filter(c => c !== word);
                color = others[Math.floor(Math.random() * 3)];
            } else {
                color = word;
            }
            state.stroopQuestions.push({ word, color });
        }

        state.digitQuestions = [];
        const lengths = [3,4,5,6,7];
        for (let i = 0; i < state.digitTotal; i++) {
            const len = lengths[i];
            let digits = '';
            for (let j = 0; j < len; j++) digits += Math.floor(Math.random() * 10).toString();
            state.digitQuestions.push({ digits, length: len });
        }
        state.digitCurrentIndex = 0;
        state.digitScore = 0;
        state.digitMaxCorrectDigits = 0;
        state.digitShowing = false;
        state.digitAnswered = false;
        showScreen('screen-stroop');
        renderStroopQuestion();
    }

    function restartTest() {
        clearAllTimers();
        showScreen('screen-welcome');
    }

    // ---------- Stroop with Timer ----------
    function renderStroopQuestion() {
        if (state.stroopCurrentIndex >= state.stroopTotal) {
            startDigitTest();
            return;
        }
        clearStroopTimers();
        state.stroopAnswered = false;
        const q = state.stroopQuestions[state.stroopCurrentIndex];
        const wordEl = document.getElementById('stroop-word-display');
        wordEl.textContent = q.word;
        wordEl.style.color = COLOR_MAP[q.color].css;
        document.getElementById('stroop-progress-text').textContent = `${state.stroopCurrentIndex+1}/${state.stroopTotal}`;
        document.getElementById('stroop-progress-fill').style.width = `${(state.stroopCurrentIndex/state.stroopTotal)*100}%`;
        document.getElementById('stroop-feedback').innerHTML = '';
        document.getElementById('stroop-timer').textContent = '4.0s';
        document.getElementById('stroop-timer').className = 'timer-display';
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.classList.remove('correct-flash','wrong-flash');
            btn.disabled = false;
            btn.style.pointerEvents = 'auto';
            btn.style.opacity = '1';
        });

        state.stroopStartTime = Date.now();
        const timerEl = document.getElementById('stroop-timer');
        state.stroopTimerInterval = setInterval(() => {
            const elapsed = Date.now() - state.stroopStartTime;
            const remaining = Math.max(0, state.stroopTimeLimit - elapsed);
            const sec = (remaining / 1000).toFixed(1);
            timerEl.textContent = sec + 's';
            if (remaining < 1500) timerEl.className = 'timer-display danger';
            else if (remaining < 2500) timerEl.className = 'timer-display warning';
            else timerEl.className = 'timer-display';
            if (remaining <= 0) {
                clearInterval(state.stroopTimerInterval);
                if (!state.stroopAnswered) stroopTimeout();
            }
        }, 100);

        state.stroopTimeoutId = setTimeout(() => {
            if (!state.stroopAnswered) stroopTimeout();
        }, state.stroopTimeLimit);
    }

    function clearStroopTimers() {
        if (state.stroopTimerInterval) clearInterval(state.stroopTimerInterval);
        if (state.stroopTimeoutId) clearTimeout(state.stroopTimeoutId);
    }

    function stroopTimeout() {
        // 超时自动判错
        if (state.stroopAnswered) return;
        state.stroopAnswered = true;
        clearStroopTimers();
        const q = state.stroopQuestions[state.stroopCurrentIndex];
        document.querySelectorAll('.color-btn').forEach(btn => { btn.disabled = true; btn.style.pointerEvents = 'none'; });
        document.getElementById('stroop-feedback').innerHTML = `<span class="feedback-tag feedback-wrong">⏰ 超时！正确颜色：${q.color}</span>`;
        document.getElementById('stroop-timer').textContent = '0.0s';
        const progress = ((state.stroopCurrentIndex+1)/state.stroopTotal)*100;
        document.getElementById('stroop-progress-fill').style.width = progress + '%';
        setTimeout(() => {
            state.stroopCurrentIndex++;
            renderStroopQuestion();
        }, 1200);
    }

    function stroopAnswer(userColor) {
        if (state.stroopAnswered) return;
        state.stroopAnswered = true;
        clearStroopTimers();
        const q = state.stroopQuestions[state.stroopCurrentIndex];
        const correct = q.color;
        const elapsed = Date.now() - state.stroopStartTime;
        const timeRatio = Math.max(0, 1 - elapsed / state.stroopTimeLimit);
        const isCorrect = (userColor === correct);
        let earnedScore = 0;

        if (isCorrect) {
            earnedScore = Math.round(5 * timeRatio); // full 5 based on speed
            state.stroopScore += earnedScore;
            document.getElementById('stroop-feedback').innerHTML = `<span class="feedback-tag feedback-correct">✓ 正确！+${earnedScore}分</span>`;
        } else {
            document.getElementById('stroop-feedback').innerHTML = `<span class="feedback-tag feedback-wrong">✗ 错误！正确颜色：${correct}</span>`;
        }

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.disabled = true;
            btn.style.pointerEvents = 'none';
            const btnColor = btn.textContent.replace(/[🔴🔵🟢🟡]\s*/, '').trim();
            if (btnColor === correct) btn.classList.add('correct-flash');
            if (btnColor === userColor && !isCorrect) btn.classList.add('wrong-flash');
        });

        const progress = ((state.stroopCurrentIndex+1)/state.stroopTotal)*100;
        document.getElementById('stroop-progress-fill').style.width = progress + '%';
        document.getElementById('stroop-timer').textContent = (elapsed/1000).toFixed(1) + 's';
        setTimeout(() => {
            state.stroopCurrentIndex++;
            renderStroopQuestion();
        }, 1200);
    }

    // ---------- Digit Span with Timer ----------
    function startDigitTest() {
        state.digitCurrentIndex = 0;
        state.digitScore = 0;
        state.digitMaxCorrectDigits = 0;
        showScreen('screen-digit');
        renderDigitQuestion();
    }

    function renderDigitQuestion() {
        if (state.digitCurrentIndex >= state.digitTotal) {
            showResults();
            return;
        }
        clearDigitTimers();
        state.digitAnswered = false;
        state.digitShowing = true;
        const q = state.digitQuestions[state.digitCurrentIndex];
        document.getElementById('digit-progress-text').textContent = `${state.digitCurrentIndex+1}/${state.digitTotal}`;
        document.getElementById('digit-progress-fill').style.width = `${(state.digitCurrentIndex/state.digitTotal)*100}%`;
        document.getElementById('digit-instruction').textContent = `记住下方数字（${q.length}位），消失后倒序输入`;
        const displayArea = document.getElementById('digit-display-area');
        displayArea.textContent = q.digits;
        displayArea.classList.remove('hidden-digits');
        document.getElementById('digit-input-area').style.display = 'none';
        document.getElementById('digit-feedback').innerHTML = '';
        document.getElementById('digit-timer').style.display = 'none';
        document.getElementById('digit-timer-hint').textContent = `⏱ 数字将在 ${q.length} 秒后消失...`;

        // 显示数字倒计时
        let remaining = q.length;
        const hintEl = document.getElementById('digit-timer-hint');
        const displayInterval = setInterval(() => {
            remaining--;
            if (remaining > 0) hintEl.textContent = `⏱ 数字将在 ${remaining} 秒后消失...`;
            else {
                hintEl.textContent = '';
                clearInterval(displayInterval);
            }
        }, 1000);

        state.digitDisplayTimeoutId = setTimeout(() => {
            clearInterval(displayInterval);
            hideDigitsAndShowInput(q);
        }, q.length * 1000);
    }

    function hideDigitsAndShowInput(q) {
        state.digitShowing = false;
        document.getElementById('digit-timer-hint').textContent = '';
        const displayArea = document.getElementById('digit-display-area');
        displayArea.textContent = '? ? ?';
        displayArea.classList.add('hidden-digits');
        document.getElementById('digit-input-area').style.display = 'block';
        document.getElementById('digit-input').value = '';
        document.getElementById('digit-input').disabled = false;
        document.getElementById('digit-submit-btn').disabled = false;
        document.getElementById('digit-instruction').textContent = `请倒序输入（${q.length}位）`;
        document.getElementById('digit-feedback').innerHTML = '';

        // 设置输入倒计时
        state.digitTimeLimit = q.length * 2000; // 每位2秒
        state.digitStartTime = Date.now();
        const timerEl = document.getElementById('digit-timer');
        timerEl.style.display = 'block';
        timerEl.textContent = (state.digitTimeLimit/1000).toFixed(1) + 's';
        timerEl.className = 'timer-display';
        document.getElementById('digit-input').focus();

        clearDigitTimers();
        state.digitTimerInterval = setInterval(() => {
            const elapsed = Date.now() - state.digitStartTime;
            const remaining = Math.max(0, state.digitTimeLimit - elapsed);
            const sec = (remaining/1000).toFixed(1);
            timerEl.textContent = sec + 's';
            if (remaining < 2000) timerEl.className = 'timer-display danger';
            else if (remaining < 4000) timerEl.className = 'timer-display warning';
            else timerEl.className = 'timer-display';
            if (remaining <= 0) {
                clearInterval(state.digitTimerInterval);
                if (!state.digitAnswered) digitTimeout();
            }
        }, 100);

        state.digitTimeoutId = setTimeout(() => {
            if (!state.digitAnswered) digitTimeout();
        }, state.digitTimeLimit);
    }

    function clearDigitTimers() {
        if (state.digitTimerInterval) clearInterval(state.digitTimerInterval);
        if (state.digitTimeoutId) clearTimeout(state.digitTimeoutId);
        if (state.digitDisplayTimeoutId) clearTimeout(state.digitDisplayTimeoutId);
    }

    function digitTimeout() {
        if (state.digitAnswered) return;
        state.digitAnswered = true;
        clearDigitTimers();
        const q = state.digitQuestions[state.digitCurrentIndex];
        document.getElementById('digit-feedback').innerHTML = `<span class="feedback-tag feedback-wrong">⏰ 超时！正确倒序：${q.digits.split('').reverse().join('')}</span>`;
        document.getElementById('digit-timer').textContent = '0.0s';
        document.getElementById('digit-input').disabled = true;
        document.getElementById('digit-submit-btn').disabled = true;
        const progress = ((state.digitCurrentIndex+1)/state.digitTotal)*100;
        document.getElementById('digit-progress-fill').style.width = progress + '%';
        setTimeout(() => {
            state.digitCurrentIndex++;
            renderDigitQuestion();
        }, 1500);
    }

    function submitDigitAnswer() {
        if (state.digitAnswered || state.digitShowing) return;
        state.digitAnswered = true;
        clearDigitTimers();
        const q = state.digitQuestions[state.digitCurrentIndex];
        const input = document.getElementById('digit-input').value.trim().replace(/\s/g, '');
        const correctReversed = q.digits.split('').reverse().join('');
        const elapsed = Date.now() - state.digitStartTime;
        const timeRatio = Math.max(0, 1 - elapsed / state.digitTimeLimit);
        let earnedScore = 0;

        if (input === '') {
            document.getElementById('digit-feedback').innerHTML = '<span class="feedback-tag feedback-wrong">未输入</span>';
        } else if (input === correctReversed) {
            earnedScore = Math.round(10 * timeRatio);
            state.digitScore += earnedScore;
            if (q.length > state.digitMaxCorrectDigits) state.digitMaxCorrectDigits = q.length;
            document.getElementById('digit-feedback').innerHTML = `<span class="feedback-tag feedback-correct">✓ 正确！+${earnedScore}分</span>`;
        } else {
            document.getElementById('digit-feedback').innerHTML = `<span class="feedback-tag feedback-wrong">✗ 错误！正确倒序：${correctReversed}</span>`;
        }

        document.getElementById('digit-input').disabled = true;
        document.getElementById('digit-submit-btn').disabled = true;
        document.getElementById('digit-timer').textContent = (elapsed/1000).toFixed(1) + 's';
        const progress = ((state.digitCurrentIndex+1)/state.digitTotal)*100;
        document.getElementById('digit-progress-fill').style.width = progress + '%';

        setTimeout(() => {
            state.digitCurrentIndex++;
            renderDigitQuestion();
        }, 1500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('digit-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !state.digitAnswered && !state.digitShowing) {
                e.preventDefault();
                submitDigitAnswer();
            }
        });
    });

    function showResults() {
        clearAllTimers();
        const total = state.stroopScore + state.digitScore;
        showScreen('screen-result');
        const circle = document.getElementById('score-circle');
        circle.className = 'score-circle';
        document.getElementById('final-score').textContent = total;
        document.getElementById('stat-stroop').textContent = `${state.stroopScore} / 50 分`;
        document.getElementById('stat-digit').textContent = `${state.digitScore} / 50 分`;
        document.getElementById('stat-max-digits').textContent = state.digitMaxCorrectDigits > 0 ? `${state.digitMaxCorrectDigits} 位数` : '未通过';

        let evaluation, detail, cls;
        if (total >= 85) {
            evaluation = '🌟 前额叶功能表现优秀'; detail = '反应迅速，抑制控制与工作记忆出色。'; cls = 'excellent';
        } else if (total >= 65) {
            evaluation = '👍 前额叶功能表现良好'; detail = '认知能力正常，速度尚可。'; cls = 'good';
        } else if (total >= 45) {
            evaluation = '📊 前额叶功能表现一般'; detail = '部分任务稍显迟缓，可加强训练。'; cls = 'fair';
        } else {
            evaluation = '🔍 前额叶功能有待提升'; detail = '答题较慢或错误较多，建议休息后重测。'; cls = 'poor';
        }
        circle.classList.add(cls);
        document.getElementById('result-evaluation').textContent = evaluation;
        document.getElementById('result-detail').textContent = detail;
    }
</script>
</body>
</html>
